name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHANNEL_ID,TELEGRAM_ADMIN_ID,OPENROUTER_API_KEY,CUSTOM_LLM_API_URL,CUSTOM_LLM_API_KEY,CUSTOM_LLM_MODEL,LLM_REQUEST_DELAY,LLM_MAX_RETRIES,IMAGE,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p ~/tg-summary-bot/data
            cd ~/tg-summary-bot

            printf '%s\n' \
              "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" \
              "TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}" \
              "TELEGRAM_ADMIN_ID=${TELEGRAM_ADMIN_ID}" \
              "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" \
              "CUSTOM_LLM_API_URL=${CUSTOM_LLM_API_URL}" \
              "CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}" \
              "CUSTOM_LLM_MODEL=${CUSTOM_LLM_MODEL}" \
              "LLM_REQUEST_DELAY=${LLM_REQUEST_DELAY}" \
              "LLM_MAX_RETRIES=${LLM_MAX_RETRIES}" \
              > .env

            printf '%s\n' \
              "services:" \
              "  bot:" \
              "    image: ${IMAGE}:latest" \
              "    volumes:" \
              "      - ./data:/app/data" \
              "    env_file:" \
              "      - .env" \
              "    restart: unless-stopped" \
              > docker-compose.yml

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull "${IMAGE}:latest"
            docker compose up -d
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ vars.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_ID: ${{ vars.TELEGRAM_ADMIN_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CUSTOM_LLM_API_URL: ${{ vars.CUSTOM_LLM_API_URL }}
          CUSTOM_LLM_API_KEY: ${{ secrets.CUSTOM_LLM_API_KEY }}
          CUSTOM_LLM_MODEL: ${{ vars.CUSTOM_LLM_MODEL }}
          LLM_REQUEST_DELAY: ${{ vars.LLM_REQUEST_DELAY }}
          LLM_MAX_RETRIES: ${{ vars.LLM_MAX_RETRIES }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
